<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: transparent; }
  #icon { width: 1024px; height: 1024px; }
</style>
</head>
<body>
<svg id="icon" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- cover green: rich, deep, slightly lit from the top like leather -->
    <linearGradient id="cover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#1e7a52"/>
      <stop offset="0.5" stop-color="#15603f"/>
      <stop offset="1"   stop-color="#0c4029"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.18" r="0.9">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#f0d98c"/>
      <stop offset="0.45" stop-color="#d4af37"/>
      <stop offset="1"   stop-color="#a8802a"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9cf7a"/>
      <stop offset="1" stop-color="#b9923a"/>
    </linearGradient>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="emboss" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <!-- 8-point star (rub el hizb): two squares, one rotated 45° -->
    <g id="star8">
      <rect x="-150" y="-150" width="300" height="300" rx="14"/>
      <rect x="-150" y="-150" width="300" height="300" rx="14" transform="rotate(45)"/>
    </g>
  </defs>

  <!-- macOS squircle: 824×824 centered, big-sur corner radius ≈ 185 -->
  <g filter="url(#drop)">
    <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#cover)"/>
    <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#sheen)"/>
  </g>

  <!-- ornamental double frame -->
  <rect x="164" y="164" width="696" height="696" rx="132" fill="none"
        stroke="url(#gold)" stroke-width="12" filter="url(#emboss)"/>
  <rect x="192" y="192" width="640" height="640" rx="112" fill="none"
        stroke="url(#goldSoft)" stroke-width="4" opacity="0.9"/>

  <!-- corner accents: small gold diamonds on the inner frame diagonals -->
  <g fill="url(#gold)" filter="url(#emboss)">
    <rect x="-19" y="-19" width="38" height="38" rx="6" transform="translate(265,265) rotate(45)"/>
    <rect x="-19" y="-19" width="38" height="38" rx="6" transform="translate(759,265) rotate(45)"/>
    <rect x="-19" y="-19" width="38" height="38" rx="6" transform="translate(265,759) rotate(45)"/>
    <rect x="-19" y="-19" width="38" height="38" rx="6" transform="translate(759,759) rotate(45)"/>
  </g>
  <!-- mid-edge accents -->
  <g fill="url(#goldSoft)" opacity="0.95">
    <circle cx="512" cy="218" r="11"/>
    <circle cx="512" cy="806" r="11"/>
    <circle cx="218" cy="512" r="11"/>
    <circle cx="806" cy="512" r="11"/>
  </g>

  <!-- central medallion -->
  <g transform="translate(512,512)" filter="url(#emboss)">
    <!-- outer star, gold -->
    <use href="#star8" fill="url(#gold)"/>
    <!-- inner star, recessed green -->
    <g transform="scale(0.86)"><use href="#star8" fill="#0d4a30"/></g>
    <!-- inner gold ring + core -->
    <circle r="118" fill="none" stroke="url(#gold)" stroke-width="10"/>
    <circle r="92"  fill="none" stroke="url(#goldSoft)" stroke-width="3" opacity="0.9"/>
    <!-- core: stylized open book -->
    <g stroke="url(#gold)" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0,-34 C -16,-46 -44,-48 -62,-42 L -62,30 C -44,24 -16,26 0,38"/>
      <path d="M0,-34 C  16,-46  44,-48  62,-42 L  62,30 C  44,24  16,26 0,38"/>
      <line x1="0" y1="-34" x2="0" y2="38"/>
    </g>
  </g>
</svg>
</body>
</html>
